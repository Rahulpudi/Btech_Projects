<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Image Classification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ABE2, #5563DE);
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: #ffffffee;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .upload-form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        input[type="file"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            font-size: 20px;
            color: #444;
            display: none;
        }

        .result {
            display: none;
            margin-top: 30px;
        }

        .image-container {
            display: flex;
            justify-content: space-around;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .image-box {
            text-align: center;
            flex: 1;
            min-width: 300px;
        }

        .image-box img {
            max-width: 100%;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }

        h3 {
            color: #444;
            margin-top: 20px;
            text-align: center;
        }

        .prediction-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .prediction-table th, .prediction-table td {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: left;
        }

        .prediction-table th {
            background-color: #007bff;
            color: white;
            font-size: 1.1em;
        }

        .confidence-bar {
            background-color: #28a745;
            height: 20px;
            border-radius: 5px;
        }

        #error {
            color: #e74c3c;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Medical Image Classification</h1>

        <div class="upload-form">
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="predict()">Analyze Image</button>
        </div>

        <div id="loading" class="loading">
            ⏳ Processing image, please wait...
        </div>

        <div id="result" class="result">
            <h2>📋 Results</h2>

            <div class="image-container">
                <div class="image-box">
                    <h3>Original Image</h3>
                    <img id="originalImage" src="" alt="Original Image">
                </div>

                <div class="image-box">
                    <h3>LIME Explanation</h3>
                    <img id="limeImage" src="" alt="LIME Explanation">
                </div>
            </div>

            <h3>Prediction: <span id="predictionClass"></span> (<span id="predictionConfidence"></span>)</h3>

            <h3>Top Predictions:</h3>
            <table class="prediction-table">
                <thead>
                    <tr>
                        <th>Class</th>
                        <th>Confidence</th>
                        <th>Visual</th>
                    </tr>
                </thead>
                <tbody id="predictionsTable"></tbody>
            </table>
        </div>

        <div id="error"></div>
    </div>

    <script>
        function predict() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('⚠️ Please select an image first.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('originalImage').src = e.target.result;
            };
            reader.readAsDataURL(file);

            const formData = new FormData();
            formData.append('file', file);

            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';

                if (data.error) {
                    document.getElementById('error').textContent = '❌ Error: ' + data.error;
                    document.getElementById('error').style.display = 'block';
                    return;
                }

                document.getElementById('predictionClass').textContent = data.predicted_class;
                document.getElementById('predictionConfidence').textContent = (data.confidence * 100).toFixed(2) + '%';
                document.getElementById('limeImage').src = 'data:image/png;base64,' + data.lime_explanation;

                const predictionsTable = document.getElementById('predictionsTable');
                predictionsTable.innerHTML = '';

                data.top_predictions.forEach(pred => {
                    const row = document.createElement('tr');

                    const classCell = document.createElement('td');
                    classCell.textContent = pred.class;

                    const confidenceCell = document.createElement('td');
                    confidenceCell.textContent = (pred.confidence * 100).toFixed(2) + '%';

                    const visualCell = document.createElement('td');
                    const barContainer = document.createElement('div');
                    barContainer.style.width = '100%';
                    barContainer.style.backgroundColor = '#f0f0f0';
                    barContainer.style.borderRadius = '5px';

                    const bar = document.createElement('div');
                    bar.className = 'confidence-bar';
                    bar.style.width = (pred.confidence * 100) + '%';
                    bar.style.height = '20px';
                    bar.style.borderRadius = '5px';

                    barContainer.appendChild(bar);
                    visualCell.appendChild(barContainer);

                    row.appendChild(classCell);
                    row.appendChild(confidenceCell);
                    row.appendChild(visualCell);

                    predictionsTable.appendChild(row);
                });

                document.getElementById('result').style.display = 'block';
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = '❌ Error: ' + error;
                document.getElementById('error').style.display = 'block';
            });
        }
    </script>
</body>
</html>
